<!--
  ══════════════════════════════════════════════════
  [SNIPPET] cb-header
  이 파일을 <body> 최상단에 붙여넣기

  이미지 경로는 페이지 위치에 맞게 조정:
    - index.html과 같은 depth → headerandbt/img/
    - 한 단계 안쪽 폴더       → ../headerandbt/img/
  ══════════════════════════════════════════════════
-->

<!-- ════════════════════════════════
     HEADER
════════════════════════════════ -->
<header class="cb-header" id="top">
  <div class="cb-header__inner">
    <div class="cb-header__notice-wrap">
      <!-- PC방 토글 (JS가 자동으로 경로 처리) -->
      <button class="toggle-btn" type="button" id="pcRoomToggle" data-state="off" aria-label="PC방 모드 토글">
        <img class="toggle-btn__img" src="headerandbt/img/off=off.png" alt="PC방 모드 OFF" loading="lazy" />
      </button>
      <!-- ▼ 공지 텍스트 수정 -->
      <p class="cb-header__notice">
        본 이벤트는 <a href="https://picaplay.com/pcbang/main.do" target="_blank" rel="noopener noreferrer"><u>피카플레이 가맹
            PC방</u></a> 또는 <b>개인PC에서</b> <a href="https://www.craftbox.co.kr/" target="_blank"
          rel="noopener noreferrer"><u>크래프트박스 설치</u></a> 후 참여 가능합니다.
      </p>
    </div>
    <button class="btn-share" type="button" id="btnShare" aria-label="공유하기">
      <img src="headerandbt/img/share_icon.svg" alt="share icon" />
      <span>공유하기</span>
    </button>
  </div>
</header>
