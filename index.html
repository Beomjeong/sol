  <!-- ▼▼ 페이지마다 수정하는 값 (여기만 수정) ▼▼ -->
  <meta property="og:title" content="SOL: enchant 그랜드 론칭 기념 SOL깃한 플레이 이벤트">
  <meta property="og:description" content="전지적 MMO RPG SOL: enchant 지금 크래프트박스 한정 플레이 보상을 획득하고 신권에 도전하세요!">
  <meta property="og:url" content="https://ics.mediaweb.co.kr/_event/20260622_sol/index.html">
  <meta property="og:image" content="assets/Thumbnail_800x400.jpg">
  <meta name="twitter:image" content="assets/Thumbnail_1200x630.jpg">
  <!-- og:image과 twitter:image 주소는 절대경로로 이미지 시안 확정 후 배포 전 반드시 교체해주세요. (상대경로 입력 시 공유 시 이미지가 깨지는 현상 발생) -->
  <!-- ▲▲ 페이지마다 수정하는 값 ▲▲ -->

  <!-- title / description / twitter 태그는 아래 스크립트가 og: 값을 읽어서 자동으로 채움 -->
  <script>
    (function () {
      var g = function (p) { return document.querySelector('meta[property="og:' + p + '"]').content; };
      document.title = g('title');
      [['name', 'description', g('description')],
      ['name', 'twitter:card', 'summary_large_image'],
      ['name', 'twitter:title', g('title')],
      ['name', 'twitter:description', g('description')],
      ['name', 'twitter:url', g('url')]
      ].forEach(function (m) {
        var el = document.createElement('meta');
        el.setAttribute(m[0], m[1]); el.content = m[2];
        document.head.appendChild(el);
      });
    })();
  </script>

  <meta name="keywords" content="솔: 인챈트, SOL: enchant, mmorpg, 리니지같은게임, 피시방이벤트, 솔인챈트, 넷마블, 솔인챈트 이벤트, 신작 RPG, 솔인챈트 무과금, 피카플레이, 크래프트박스">
