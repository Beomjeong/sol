  <!-- og:image과 twitter:image 주소는 절대경로로 이미지 시안 확정 후 배포 전 반드시 교체해주세요. (상대경로 입력 시 공유 시 이미지가 깨지는 현상 발생) -->
  <!-- ▲▲ 페이지마다 수정하는 값 ▲▲ -->

  <!-- title / description / twitter 태그는 아래 스크립트가 og: 값을 읽어서 자동으로 채움 -->
  <script>
    (function () {
      var g = function (p) { return document.querySelector('meta[property="og:' + p + '"]').content; };
      document.title = g('title');
      [['name', 'description', g('description')],
      ['name', 'twitter:card', 'summary_large_image'],
      ['name', 'twitter:title', g('title')],
      ['name', 'twitter:description', g('description')],
      ['name', 'twitter:url', g('url')]
      ].forEach(function (m) {
        var el = document.createElement('meta');
        el.setAttribute(m[0], m[1]); el.content = m[2];
        document.head.appendChild(el);
      });
    })();
  </script>
